name: Build envtest images

on:
  workflow_dispatch:
    inputs:
      kubernetes_versions:
        description: 'Comma-separated Kubernetes versions (e.g. 1.32.0,1.33.0,1.34.0,1.35.0)'
        required: true
        type: string
      image_repository:
        description: 'Container image repository'
        required: false
        default: 'quay.io/lburgazzoli/testcontainers-envtest'
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          VERSIONS=$(echo '${{ inputs.kubernetes_versions }}' | jq -R -c 'split(",") | map(ltrimstr(" ") | rtrimstr(" "))')
          echo "matrix=${VERSIONS}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ${{ fromJSON(needs.prepare.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        run: |
          make image/build image/push
        env:
          KUBERNETES_VERSION: ${{ matrix.version }}
          IMAGE_REPOSITORY: ${{ inputs.image_repository }}
          IMAGE_TAG: ${{ matrix.version }}
