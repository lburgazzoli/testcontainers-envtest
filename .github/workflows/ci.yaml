name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Lint
        run: make lint

  build:
    name: Build Image
    runs-on: ubuntu-latest
    outputs:
      image-repository: ${{ steps.image.outputs.repository }}
      image-tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and push to ttl.sh
        id: image
        run: |
          REPOSITORY="ttl.sh/$(uuidgen)"
          TAG="1h"

          docker build \
            --build-arg ENVTEST_VERSION=${KUBERNETES_VERSION} \
            -t "${REPOSITORY}:${TAG}" \
            image/

          docker push "${REPOSITORY}:${TAG}"

          echo "repository=${REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  test:
    name: Test (${{ matrix.container-runtime }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        container-runtime:
          - docker
          - podman
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Configure Podman
        if: matrix.container-runtime == 'podman'
        run: |
          # Enable Podman socket in rootful mode
          # Rootless Podman cannot properly handle privileged containers
          sudo systemctl enable --now podman.socket

          # Allow the runner user to access the rootful Podman socket
          sudo chmod a+rw /run/podman/podman.sock

          echo "DOCKER_HOST=unix:///run/podman/podman.sock" >> $GITHUB_ENV
          echo "TESTCONTAINERS_RYUK_DISABLED=true" >> $GITHUB_ENV

          sudo podman version
          sudo podman info

      - name: Verify container runtime
        run: |
          if [ "${{ matrix.container-runtime }}" = "podman" ]; then
            sudo podman ps || exit 1
            echo "✓ Podman is configured and running"
          else
            docker ps || exit 1
            echo "✓ Docker is configured and running"
          fi

      - name: Run tests
        run: make test
        env:
          ENVTEST_IMAGE_REPOSITORY: ${{ needs.build.outputs.image-repository }}
          ENVTEST_KUBERNETES_VERSION: ${{ needs.build.outputs.image-tag }}
